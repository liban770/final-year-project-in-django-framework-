{% extends "base.html" %}
{% block content %}
<div class="mx-auto mt-12 w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
    <h2 class="mb-2 text-2xl font-bold text-slate-900">Welcome Back</h2>
    <p class="mb-6 text-sm text-slate-600">Login to continue to your dashboard.</p>
    <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
            <label for="id_username" class="mb-1 block text-sm font-medium text-slate-700">Username</label>
            <input type="text" name="username" id="id_username" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:ring-2 focus:ring-indigo-500" required>
        </div>
        <div>
            <label for="id_password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
            <input type="password" name="password" id="id_password" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:ring-2 focus:ring-indigo-500" required>
        </div>
        <button class="w-full rounded-lg bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600 px-4 py-2 font-medium text-white shadow-lg transition-all duration-300 hover:scale-105" type="submit">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
