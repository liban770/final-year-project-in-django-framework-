{% extends "base.html" %}
{% block content %}
<div class="flex min-h-[calc(100vh-8rem)] items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 text-lg font-bold text-white shadow-lg">TT</div>
            <h2 class="text-2xl font-semibold text-gray-800">Welcome back</h2>
            <p class="mt-2 text-sm text-gray-600">Sign in to ThesisTrack</p>
        </div>

        <div class="rounded-2xl border border-gray-100/80 bg-white p-8 shadow-md transition-all duration-200 hover:shadow-xl">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="mb-2 block text-sm font-medium text-gray-700">Username</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </span>
                        <input type="text" name="username" id="id_username" required class="w-full rounded-full border border-gray-200 bg-gray-50 py-3 pl-12 pr-4 text-sm text-gray-800 outline-none transition-all duration-200 focus:border-indigo-300 focus:bg-white focus:ring-2 focus:ring-indigo-500/20" placeholder="you@example" autocomplete="username">
                    </div>
                </div>
                <div>
                    <label for="id_password" class="mb-2 block text-sm font-medium text-gray-700">Password</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </span>
                        <input type="password" name="password" id="id_password" required class="w-full rounded-full border border-gray-200 bg-gray-50 py-3 pl-12 pr-4 text-sm text-gray-800 outline-none transition-all duration-200 focus:border-indigo-300 focus:bg-white focus:ring-2 focus:ring-indigo-500/20" placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="w-full rounded-full bg-gradient-to-r from-indigo-500 to-purple-600 py-3.5 text-sm font-semibold text-white shadow-md transition-all duration-200 hover:shadow-xl">
                    Sign in
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
