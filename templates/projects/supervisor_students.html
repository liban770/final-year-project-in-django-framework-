{% extends "base.html" %}
{% block content %}
<div class="rounded-2xl bg-white p-5 shadow-lg">
    <h2 class="mb-4 text-2xl font-bold">Assigned Students</h2>
    <div class="overflow-x-auto">
        <table class="min-w-full overflow-hidden rounded-xl text-sm">
            <thead class="bg-slate-100"><tr><th class="px-4 py-3 text-left">Username</th><th class="px-4 py-3 text-left">Email</th></tr></thead>
            <tbody>
                {% for assignment in assignments %}
                    <tr class="border-b odd:bg-white even:bg-slate-50 hover:bg-indigo-50">
                        <td class="px-4 py-3">{{ assignment.student.username }}</td>
                        <td class="px-4 py-3">{{ assignment.student.email|default:"-" }}</td>
                    </tr>
                {% empty %}
                    <tr><td colspan="2" class="px-4 py-8 text-center text-slate-500">No students assigned yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
