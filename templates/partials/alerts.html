{% if messages %}
    <div class="mb-6 space-y-3">
        {% for message in messages %}
            <div class="rounded-2xl border border-indigo-100 bg-gradient-to-r from-indigo-50 via-white to-purple-50 px-5 py-3.5 text-sm text-slate-900 shadow-sm transition-all duration-200 hover:shadow-md">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
