{% if messages %}
    <div class="mb-6 space-y-2">
        {% for message in messages %}
            <div class="rounded-xl border border-indigo-200 bg-indigo-50 px-4 py-3 text-sm text-indigo-800 shadow-sm">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
