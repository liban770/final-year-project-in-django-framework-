{% if messages %}
    <div class="mb-6 space-y-3">
        {% for message in messages %}
            <div class="rounded-2xl border border-indigo-100 bg-indigo-50/90 px-5 py-3.5 text-sm text-indigo-900 shadow-sm transition-all duration-200 hover:shadow-md">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
